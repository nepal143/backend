name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'PLACEMENTgO/backend'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: JSEARCH_API_KEY,ADZUNA_APP_ID,ADZUNA_APP_KEY
          script: |
            set -e
            echo "==> Pulling latest backend code..."
            cd ~/app/backend
            git fetch origin main
            git reset --hard origin/main

            echo "==> Injecting new API keys into .env (only if secret is non-empty)..."
            cd ~/app
            if [ -n "${JSEARCH_API_KEY}" ]; then
              grep -qxF "JSEARCH_API_KEY=${JSEARCH_API_KEY}" .env || echo "JSEARCH_API_KEY=${JSEARCH_API_KEY}" >> .env
              sed -i "s|^JSEARCH_API_KEY=.*|JSEARCH_API_KEY=${JSEARCH_API_KEY}|" .env
            fi
            if [ -n "${ADZUNA_APP_ID}" ]; then
              grep -qxF "ADZUNA_APP_ID=${ADZUNA_APP_ID}" .env || echo "ADZUNA_APP_ID=${ADZUNA_APP_ID}" >> .env
              sed -i "s|^ADZUNA_APP_ID=.*|ADZUNA_APP_ID=${ADZUNA_APP_ID}|" .env
            fi
            if [ -n "${ADZUNA_APP_KEY}" ]; then
              grep -qxF "ADZUNA_APP_KEY=${ADZUNA_APP_KEY}" .env || echo "ADZUNA_APP_KEY=${ADZUNA_APP_KEY}" >> .env
              sed -i "s|^ADZUNA_APP_KEY=.*|ADZUNA_APP_KEY=${ADZUNA_APP_KEY}|" .env
            fi

            echo "==> Checking disk space..."
            DISK_USED=$(df / | awk 'NR==2{gsub(/%/,"",$5); print $5}')
            echo "Disk used: ${DISK_USED}%"
            if [ "$DISK_USED" -gt 60 ]; then
              echo "Disk above 60%, running aggressive prune..."
              docker builder prune -f
              docker image prune -af
              docker system prune -f
            fi

            echo "==> Rebuilding backend container..."
            cd ~/app
            docker compose up -d --build --no-deps backend

            echo "==> Done. Backend deployed."
            docker ps --format "table {{.Names}}\t{{.Status}}"
