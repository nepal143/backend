server:
  port: ${PORT:8080}

spring:
  application:
    name: placementgo-backend

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/placementgo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false

    properties:
      hibernate:
        format_sql: true

jd-intel:
  search-api-key: ${SEARCH_API_KEY:}
  search-engine-id: ${SEARCH_ENGINE_ID:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-2.5-flash

gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: https://generativelanguage.googleapis.com/v1beta
  model: gemini-2.5-flash
  temperature: 0.2

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

google:
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}

app:
  base-url: ${APP_BASE_URL:https://placementgo.in}

resume:
  groq:
    api-key: ${GROQ_API_KEY:}
    base-url: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile
    temperature: 0.2

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_Sc9CZ9jM42rqxI}
  key-secret: ${RAZORPAY_KEY_SECRET:3073xjbKcPnGVG089eMlAmoe}

# ── Auto-Apply Pipeline ───────────────────────────────────────────────────────
autoapply:
  # Cron: every 6 hours by default.  Override: "0 0 8,14,20 * * *" for 3×/day
  schedule:
    cron: ${AUTOAPPLY_CRON:0 0 */6 * * *}
  # JSearch (RapidAPI) – https://rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch
  jsearch:
    api-key: ${JSEARCH_API_KEY:}
  # Adzuna – https://developer.adzuna.com/
  adzuna:
    app-id:  ${ADZUNA_APP_ID:}
    app-key: ${ADZUNA_APP_KEY:}
    country: ${ADZUNA_COUNTRY:us}
